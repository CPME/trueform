<svg xmlns="http://www.w3.org/2000/svg" width="1620" height="900" viewBox="0 0 1620 900">
  <style>
    .panel { fill: rgba(15, 23, 36, 0.92); stroke: #20324a; stroke-width: 2; rx: 14; }
    .title { fill: #eef4fb; font: 700 24px ui-sans-serif, system-ui, sans-serif; }
    .legend-label { fill: #d7e3f2; font: 600 15px ui-sans-serif, system-ui, sans-serif; }
    .legend-id { fill: #d7e3f2; font: 500 12px ui-monospace, SFMono-Regular, Menlo, monospace; }
    .note { fill: #a9bbd0; font: 500 14px ui-sans-serif, system-ui, sans-serif; }
    .swatch-a { fill: #06b6d4; stroke: #101820; stroke-width: 2; }
    .swatch-b { fill: #22c55e; stroke: #101820; stroke-width: 2; }
    .swatch-c { fill: #ec4899; stroke: #101820; stroke-width: 2; }
  </style>

  <image href="selection-ledger-chamfer-join-review.iso.png" x="0" y="0" width="1200" height="900" />
  <rect x="1208" y="0" width="412" height="900" fill="#0a1119" />

  <rect x="1232" y="24" width="364" height="350" class="panel" />
  <text x="1252" y="60" class="title">Chamfer Join Audit</text>

  <circle cx="1264" cy="94" r="10" class="swatch-a" />
  <text x="1286" y="99" class="legend-label">A  chamfer face 1</text>
  <text x="1286" y="119" class="legend-id">face:body.main~review-chamfer-join.</text>
  <text x="1286" y="136" class="legend-id">chamfer.seed.1</text>

  <circle cx="1264" cy="164" r="10" class="swatch-b" />
  <text x="1286" y="169" class="legend-label">B  chamfer face 2</text>
  <text x="1286" y="189" class="legend-id">face:body.main~review-chamfer-join.</text>
  <text x="1286" y="206" class="legend-id">chamfer.seed.2</text>

  <circle cx="1264" cy="234" r="10" class="swatch-c" />
  <text x="1286" y="239" class="legend-label">C  join edge</text>
  <text x="1286" y="259" class="legend-id">edge:body.main~review-chamfer-join.</text>
  <text x="1286" y="276" class="legend-id">chamfer.seed.1.join.chamfer.seed.2</text>

  <text x="1252" y="314" class="note">The magenta edge is between two modifier-created</text>
  <text x="1252" y="334" class="note">chamfer faces, so it is a `join.*` edge, not `bound.*`.</text>
</svg>
