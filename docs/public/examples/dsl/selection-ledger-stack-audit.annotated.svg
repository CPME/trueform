<svg xmlns="http://www.w3.org/2000/svg" width="1620" height="900" viewBox="0 0 1620 900">
  <style>
    .panel { fill: rgba(15, 23, 36, 0.9); stroke: #20324a; stroke-width: 2; rx: 14; }
    .title { fill: #eef4fb; font: 700 26px ui-sans-serif, system-ui, sans-serif; }
    .legend-label { fill: #d7e3f2; font: 600 15px ui-sans-serif, system-ui, sans-serif; }
    .legend-id { fill: #d7e3f2; font: 500 12px ui-monospace, SFMono-Regular, Menlo, monospace; }
    .note { fill: #a9bbd0; font: 500 15px ui-sans-serif, system-ui, sans-serif; }
    .swatch-a { fill: #f97316; stroke: #101820; stroke-width: 2; }
    .swatch-b { fill: #06b6d4; stroke: #101820; stroke-width: 2; }
    .swatch-c { fill: #22c55e; stroke: #101820; stroke-width: 2; }
    .swatch-d { fill: #eab308; stroke: #101820; stroke-width: 2; }
  </style>

  <image href="selection-ledger-stack-audit.iso.png" x="0" y="0" width="1200" height="900" />
  <rect x="1208" y="0" width="412" height="900" fill="#0a1119" />

  <rect x="1232" y="24" width="364" height="392" class="panel" />
  <text x="1252" y="62" class="title">Selection Audit</text>

  <circle cx="1264" cy="96" r="10" class="swatch-a" />
  <text x="1286" y="101" class="legend-label">A  source edge (pre-fillet)</text>
  <text x="1286" y="121" class="legend-id">edge:body.boss~boss.</text>
  <text x="1286" y="138" class="legend-id">hd02c8fff3fcee9ed.3</text>

  <circle cx="1264" cy="166" r="10" class="swatch-b" />
  <text x="1286" y="171" class="legend-label">B  current edge (post-fillet)</text>
  <text x="1286" y="191" class="legend-id">edge:body.main~union-main.</text>
  <text x="1286" y="208" class="legend-id">fillet.seed.1.join.top</text>

  <circle cx="1264" cy="236" r="10" class="swatch-c" />
  <text x="1286" y="241" class="legend-label">C  fillet face</text>
  <text x="1286" y="261" class="legend-id">face:body.main~union-main.</text>
  <text x="1286" y="278" class="legend-id">fillet.seed.1</text>

  <circle cx="1264" cy="306" r="10" class="swatch-d" />
  <text x="1286" y="311" class="legend-label">D  preserved base face</text>
  <text x="1286" y="331" class="legend-id">face:body.main~union-main.</text>
  <text x="1286" y="348" class="legend-id">side.base-1</text>

  <text x="1252" y="382" class="note">Orange is a historical seed edge from the boss step.</text>
  <text x="1252" y="404" class="note">Cyan, green, and gold are current topology on</text>
  <text x="1252" y="426" class="note">the final union body.</text>
</svg>
